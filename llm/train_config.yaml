model_name_or_path: ./models/gemma-3-1b
stage: sft
do_train: true
finetuning_type: lora
lora_target: q_proj,k_proj,v_proj,o_proj
lora_rank: 16
lora_alpha: 32
lora_dropout: 0.1
dataset_dir: data
dataset: anchor_assistant_train
template: gemma
output_dir: saves/gemma-3-1b-lora
overwrite_output_dir: true
per_device_train_batch_size: 1
gradient_accumulation_steps: 8
learning_rate: 2e-4
num_train_epochs: 3.0
logging_steps: 10
save_steps: 200
save_total_limit: 2
lr_scheduler_type: cosine
warmup_ratio: 0.1
optim: adamw_torch
fp16: true
report_to: none
